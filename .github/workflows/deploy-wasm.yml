name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install marimo and pywidget
        run: pip install marimo pywidget anywidget

      - name: Export marimo WASM demo
        run: |
          marimo export html-wasm examples/pywidget_demo_mo.py -o _site/marimo --show-code

      - name: Install mystmd
        run: npm install -g mystmd

      - name: Build MyST examples
        env:
          BASE_URL: /pywidget/myst
        run: |
          cd examples/myst
          myst build --html

      - name: Copy MyST output to _site/myst
        run: cp -r examples/myst/_build/html _site/myst

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
